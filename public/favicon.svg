<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#0a0e24"/>
  
  <!-- 外层星辉光晕 -->
  <circle cx="32" cy="32" r="18" fill="rgba(59, 130, 246, 0.08)"/>
  
  <!-- 六芒星（原神风格星标） -->
  <polygon points="32,12 35.5,24 48,24 38,32 42,44 32,36 22,44 26,32 16,24 28.5,24" 
           fill="#f0d050" opacity="0.95"/>
  
  <!-- 内层小星 -->
  <polygon points="32,20 33.5,26 39,26 34.5,30 36,36 32,32 28,36 29.5,30 25,26 30.5,26" 
           fill="#fff8e0" opacity="0.6"/>
  
  <!-- 中心光点 -->
  <circle cx="32" cy="32" r="2" fill="#fff" opacity="0.8"/>
</svg>
